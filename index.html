<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Lotto Generator</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='style.css'>
    <script src='main.js' defer></script>
</head>

<body>
    <div class="container">
        <div class="theme-switch-wrapper">
            <span id="theme-label">Light Mode</span>
            <label class="theme-switch" for="checkbox">
                <input type="checkbox" id="checkbox" onchange="toggleTheme(this)" />
                <div class="slider round"></div>
            </label>
        </div>
        
        <div class="lotto-container">
            <h2>로또 번호 추첨기</h2>
            <button class="generate-btn" onclick="generateLotto()">Generate 5 Sets</button>
            <div id="lotto-results">
                <!-- Lotto numbers will appear here -->
            </div>
        </div>
    </div>
</body>

</html>
