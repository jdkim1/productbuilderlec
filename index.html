<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Lotto Generator</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4189687657593662"
     crossorigin="anonymous"></script>
    <link rel='stylesheet' type='text/css' media='screen' href='style.css'>
    <script src='main.js' defer></script>
</head>

<body>
    <div class="container">
        <div class="theme-switch-wrapper">
            <span id="theme-label">Light Mode</span>
            <label class="theme-switch" for="checkbox">
                <input type="checkbox" id="checkbox" onchange="toggleTheme(this)" />
                <div class="slider round"></div>
            </label>
        </div>
        
        <div class="lotto-container">
            <h2>로또 추첨기</h2>
            <button class="generate-btn" onclick="generateLotto()">Generate 5 Sets</button>
            <div id="lotto-results">
                <!-- Lotto numbers will appear here -->
            </div>
        </div>

        <div class="contact-container">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xaqvooae" method="POST">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" placeholder="성함을 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </div>
        </div>
</body>

</html>
